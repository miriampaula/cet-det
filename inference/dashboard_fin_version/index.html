<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<title>CET·DET</title>
<style>
*{box-sizing:border-box;}
html,body{margin:0;padding:0;background:#0a0c10;height:100%;}
::-webkit-scrollbar{width:10px;height:10px;}
::-webkit-scrollbar-track{background:#0d1014;}
::-webkit-scrollbar-thumb{background:#232a36;border-radius:6px;border:2px solid #0d1014;}
::-webkit-scrollbar-thumb:hover{background:#2e3645;}
@keyframes shimmer{0%{opacity:.35}50%{opacity:.7}100%{opacity:.35}}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
body{display:flex;flex-direction:column;height:100vh;background:#0a0c10;color:#e8edf4;font-family:'IBM Plex Sans',system-ui,sans-serif;overflow:hidden;}
button{cursor:pointer;border:none;font-family:inherit;}
.card{background:#0e1116;border:1px solid rgba(255,255,255,.07);border-radius:14px;}
.mono{font-family:'IBM Plex Mono',monospace;}
.sec-label{font-size:9px;color:#5d6878;letter-spacing:.16em;font-family:'IBM Plex Mono',monospace;text-transform:uppercase;}
</style>
</head>
<body>

<!-- TOP BAR -->
<div style="display:flex;align-items:center;gap:20px;padding:0 18px;height:54px;flex:0 0 auto;background:linear-gradient(180deg,#12151b,#0e1116);border-bottom:1px solid rgba(255,255,255,.07);">
  <div style="display:flex;align-items:center;gap:11px;">
    <div style="width:26px;height:26px;border-radius:6px;background:linear-gradient(140deg,#3fd2e6,#b69bff);display:flex;align-items:center;justify-content:center;box-shadow:0 0 18px rgba(63,210,230,.35);">
      <div style="width:11px;height:11px;border-radius:50%;border:2.5px solid #0a0c10;"></div>
    </div>
    <div style="line-height:1;">
      <div style="font-size:15px;font-weight:700;letter-spacing:.14em;">CET·DET</div>
      <div style="font-size:9.5px;color:#5d6878;letter-spacing:.22em;margin-top:3px;font-family:'IBM Plex Mono',monospace;">DETECTION REVIEW</div>
    </div>
  </div>
  <div style="width:1px;height:26px;background:rgba(255,255,255,.08);"></div>
  <div id="dataset-tabs" style="display:flex;gap:3px;padding:3px;background:#0c0f14;border:1px solid rgba(255,255,255,.07);border-radius:9px;"></div>
  <div style="flex:1;"></div>
  <div id="view-tabs" style="display:flex;gap:2px;padding:3px;background:#0c0f14;border:1px solid rgba(255,255,255,.07);border-radius:9px;"></div>
</div>

<!-- FILTER BAR -->
<div style="display:flex;align-items:center;gap:16px;padding:9px 18px;height:50px;flex:0 0 auto;background:#0d1015;border-bottom:1px solid rgba(255,255,255,.06);overflow-x:auto;">
  <div style="display:flex;align-items:center;gap:7px;flex:0 0 auto;">
    <span class="sec-label">OUTCOME</span>
    <div id="outcome-chips" style="display:flex;gap:5px;"></div>
  </div>
  <div style="width:1px;height:22px;background:rgba(255,255,255,.08);flex:0 0 auto;"></div>
  <div style="display:flex;align-items:center;gap:7px;flex:0 0 auto;">
    <span class="sec-label">SPECIES</span>
    <select id="sp-sel" style="background:#161a22;color:#cdd6e2;border:1px solid rgba(255,255,255,.1);border-radius:7px;padding:6px 8px;font-size:11.5px;cursor:pointer;font-family:'IBM Plex Mono',monospace;"></select>
    <div id="side-tabs" style="display:flex;gap:2px;padding:2px;background:#0c0f14;border:1px solid rgba(255,255,255,.08);border-radius:7px;"></div>
  </div>
  <div style="width:1px;height:22px;background:rgba(255,255,255,.08);flex:0 0 auto;"></div>
  <button id="spec-btn" style="display:flex;align-items:center;gap:7px;padding:6px 11px;border-radius:7px;flex:0 0 auto;font-family:'IBM Plex Sans',sans-serif;font-size:11.5px;background:transparent;color:#7c8696;border:1px solid rgba(255,255,255,.08);">
    <span id="spec-dot" style="width:13px;height:13px;border-radius:4px;flex:0 0 auto;border:1.5px solid #3a414e;background:transparent;display:block;"></span>
    <span>Has spectrogram</span>
  </button>
  <div style="flex:1;min-width:14px;"></div>
  <div style="display:flex;align-items:center;gap:12px;flex:0 0 auto;font-family:'IBM Plex Mono',monospace;font-size:10.5px;">
    <span style="display:flex;align-items:center;gap:5px;color:#9aa6b6;"><span style="width:9px;height:9px;border-radius:2px;background:#3fd2e6;box-shadow:0 0 7px rgba(63,210,230,.5);"></span>MINE</span>
    <span style="display:flex;align-items:center;gap:5px;color:#9aa6b6;"><span style="width:9px;height:9px;border-radius:2px;background:#b69bff;box-shadow:0 0 7px rgba(182,155,255,.5);"></span>EXPERT</span>
  </div>
</div>

<!-- BODY -->
<div id="body" style="flex:1 1 auto;overflow:auto;position:relative;">

  <div id="loading-screen" style="display:flex;align-items:center;justify-content:center;height:100%;flex-direction:column;gap:14px;">
    <div style="width:160px;height:5px;border-radius:3px;background:linear-gradient(90deg,#3fd2e6,#b69bff);animation:shimmer 1.3s ease-in-out infinite;"></div>
    <div style="font-family:'IBM Plex Mono',monospace;font-size:11px;color:#5d6878;letter-spacing:.18em;">LOADING DETECTIONS…</div>
  </div>

  <div id="overview-screen" style="display:none;padding:18px 22px 40px;">
    <div id="kpi-strip" style="display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:18px;"></div>
    <div style="display:flex;align-items:center;gap:14px;margin-bottom:16px;">
      <div id="mode-tabs" style="display:flex;gap:3px;padding:3px;background:#0c0f14;border:1px solid rgba(255,255,255,.08);border-radius:9px;"></div>
      <div id="mode-hint" style="font-size:11.5px;color:#5d6878;"></div>
    </div>
    <div id="density-panel" style="display:none;"></div>
    <div id="bands-panel" style="display:none;"></div>
    <div id="matrix-panel" style="display:none;"></div>
  </div>

  <div id="review-screen" style="display:none;height:100%;overflow:hidden;">
    <div style="width:312px;flex:0 0 auto;border-right:1px solid rgba(255,255,255,.07);background:#0c0f14;display:flex;flex-direction:column;overflow:hidden;">
      <div style="padding:13px 15px;border-bottom:1px solid rgba(255,255,255,.06);display:flex;align-items:center;justify-content:space-between;">
        <span class="sec-label">MINUTES</span>
        <span id="rail-count" style="font-size:11px;color:#5d6878;font-family:'IBM Plex Mono',monospace;"></span>
      </div>
      <div id="rail-list" style="flex:1;overflow-y:auto;padding:8px;"></div>
    </div>
    <div id="review-detail" style="flex:1;overflow-y:auto;padding:18px 22px 40px;"></div>
  </div>

</div>

<script>
// ── config ───────────────────────────────────────────────────────────────────
const SPEC   = { fmin:0, fmax:16000, w:500, h:128 };
const OC     = { TP:'#43e08f', FP:'#f2b03c', FN:'#f0604f', TN:'#5a6573' };
const OCNAME = { TP:'True positive', FP:'False positive', FN:'False negative', TN:'True negative' };
const SPORDER= ['Ambig','Tt','Oo','Pm','Gg','Dd','Gm','Sc','Ba','Bp'];
const MO     = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const MAXCOL = 480, RAIL_CAP = 300;

// ── state ────────────────────────────────────────────────────────────────────
const S = {
  data:null, datasetId:null,
  view:'overview', mode:'density',
  outcomes:{TP:true,FP:true,TN:true,FN:true},
  speciesFilter:'all', side:'either', specOnly:false,
  selWav:null, selSeg:0
};

// ── utils ────────────────────────────────────────────────────────────────────
function cmap(t) {
  t = Math.max(0,Math.min(1,t));
  const s=[[0,[12,14,30]],[0.16,[26,40,120]],[0.4,[34,110,200]],[0.6,[28,180,190]],[0.78,[110,224,120]],[1,[242,236,90]]];
  for(let i=0;i<s.length-1;i++){
    const[a,ca]=s[i],[b,cb]=s[i+1];
    if(t<=b){const f=(t-a)/(b-a||1);return'rgb('+ca.map((c,j)=>Math.round(c+(cb[j]-c)*f)).join(',')+')';}
  }
  return'rgb(242,236,90)';
}
function mel(f){return 2595*Math.log10(1+f/700);}
function freqTicks(){
  const{fmin,fmax}=SPEC,m0=mel(Math.max(fmin,1)),m1=mel(fmax);
  return[100,250,500,1000,2000,4000,8000,12000,16000].filter(f=>f>=Math.max(fmin,1)&&f<=fmax).map(f=>({
    f,pos:(mel(f)-m0)/(m1-m0),
    label:f>=1000?(f%1000===0?(f/1000)+'k':(f/1000).toFixed(1)+'k'):f
  }));
}
const p2=n=>String(n).padStart(2,'0');
function fmtTime(ts){if(!ts)return'—';const d=new Date(ts);return MO[d.getUTCMonth()]+' '+p2(d.getUTCDate())+' · '+p2(d.getUTCHours())+':'+p2(d.getUTCMinutes());}
function fmtDate(ts){const d=new Date(ts);return MO[d.getUTCMonth()]+' '+p2(d.getUTCDate());}
function fmtHour(ts){const d=new Date(ts);return p2(d.getUTCHours())+':'+p2(d.getUTCMinutes());}
function segPos(s){return s.p!=='bg';}
function wavOutcome(w){const m=w.segs.some(segPos);return w.expDet?(m?'TP':'FN'):(m?'FP':'TN');}
function spName(c){return(S.data&&S.data.species&&S.data.species[c])||c;}
function getWavs(){return S.data.datasets[S.datasetId].wavs;}
function passFilters(w){
  if(!S.outcomes[w._oc])return false;
  if(S.specOnly&&!w.spec)return false;
  const sp=S.speciesFilter;
  if(sp!=='all'){
    const mH=w.segs.some(s=>segPos(s)&&s.t.some(([c,p])=>c===sp&&p>=0.05));
    const eH=(w.expFlags&&w.expFlags[sp]!=null)||(w.expDet&&w.expSp===sp);
    if(S.side==='mine'&&!mH)return false;
    if(S.side==='expert'&&!eH)return false;
    if(S.side==='either'&&!(mH||eH))return false;
  }
  return true;
}

function buildCols(wavs){
  const n=wavs.length,bs=Math.max(1,Math.ceil(n/MAXCOL)),cols=[];
  for(let a=0;a<n;a+=bs)cols.push([a,Math.min(n,a+bs)]);
  return{cols,bs};
}
function colTime(wavs,a,b){return fmtTime(wavs[a].t)+(b-a>1?' – '+fmtTime(wavs[b-1].t):'');}

// ── boot ─────────────────────────────────────────────────────────────────────
fetch('data/detections.json').then(r=>r.json()).then(data=>{
  S.data=data;
  S.datasetId=Object.keys(data.datasets)[0];
  Object.values(data.datasets).forEach(ds=>ds.wavs.forEach(w=>{w._oc=wavOutcome(w);}));
  document.getElementById('loading-screen').style.display='none';
  buildTopBar();
  buildFilterBar();
  showAll();
}).catch(e=>{
  document.getElementById('loading-screen').innerHTML=`<div style="color:#f0604f;padding:20px;font-family:'IBM Plex Mono',monospace;">Failed to load: ${e.message}</div>`;
});

// ── top bar ───────────────────────────────────────────────────────────────────
function buildTopBar(){
  const dt=document.getElementById('dataset-tabs');
  Object.entries(S.data.datasets).forEach(([id,ds])=>{
    const b=document.createElement('button');
    const sub=(ds.myGranularity||5)+'s · '+(ds.expertSpeciesNote||'');
    b.innerHTML=`<span style="font-weight:600;letter-spacing:.05em;font-size:12px;">${id}</span><span style="font-size:8.5px;letter-spacing:.08em;color:#6b94a8;font-family:'IBM Plex Mono',monospace;display:block;margin-top:2px;">${sub}</span>`;
    b.style.cssText='display:flex;flex-direction:column;align-items:flex-start;gap:2px;padding:6px 13px;border-radius:7px;border:none;cursor:pointer;';
    b.dataset.ds=id;
    b.addEventListener('click',()=>{S.datasetId=id;S.selWav=null;S.selSeg=0;refreshDatasetTabs();refreshOutcomeChips();showAll();});
    dt.appendChild(b);
  });
  const vt=document.getElementById('view-tabs');
  [['overview','Overview'],['review','Review']].forEach(([v,l])=>{
    const b=document.createElement('button');
    b.textContent=l;b.dataset.v=v;
    b.style.cssText='padding:7px 16px;border-radius:7px;border:none;cursor:pointer;font-family:IBM Plex Sans,sans-serif;font-size:12.5px;';
    b.addEventListener('click',()=>{S.view=v;refreshViewTabs();switchScreen();});
    vt.appendChild(b);
  });
  refreshDatasetTabs();refreshViewTabs();
}
function refreshDatasetTabs(){
  document.querySelectorAll('#dataset-tabs button').forEach(b=>{
    const a=b.dataset.ds===S.datasetId;
    b.style.background=a?'linear-gradient(180deg,#222a37,#1a212c)':'transparent';
    b.style.color=a?'#e8edf4':'#7c8696';
    b.style.boxShadow=a?'inset 0 0 0 1px rgba(255,255,255,.08)':'none';
  });
}
function refreshViewTabs(){
  document.querySelectorAll('#view-tabs button').forEach(b=>{
    const a=b.dataset.v===S.view;
    b.style.background=a?'#e8edf4':'transparent';
    b.style.color=a?'#0a0c10':'#9aa6b6';
    b.style.fontWeight=a?'600':'500';
  });
}

// ── filter bar ────────────────────────────────────────────────────────────────
function buildFilterBar(){
  const oc=document.getElementById('outcome-chips');
  ['TP','FP','FN','TN'].forEach(code=>{
    const b=document.createElement('button');
    b.dataset.oc=code;
    b.addEventListener('click',()=>{S.outcomes[code]=!S.outcomes[code];refreshOutcomeChips();if(S.view==='review')renderReview();});
    oc.appendChild(b);
  });
  const sel=document.getElementById('sp-sel');
  sel.innerHTML='<option value="all">All species</option>';
  SPORDER.forEach(c=>{const o=document.createElement('option');o.value=c;o.textContent=c+' · '+spName(c);sel.appendChild(o);});
  sel.addEventListener('change',e=>{S.speciesFilter=e.target.value;if(S.view==='review')renderReview();});
  const st=document.getElementById('side-tabs');
  [['mine','Mine'],['expert','Expert'],['either','Either']].forEach(([v,l])=>{
    const b=document.createElement('button');
    b.textContent=l;b.dataset.side=v;
    b.style.cssText='padding:5px 10px;border-radius:6px;border:none;cursor:pointer;font-family:IBM Plex Mono,monospace;font-size:10.5px;';
    b.addEventListener('click',()=>{S.side=v;refreshSideTabs();if(S.view==='review')renderReview();});
    st.appendChild(b);
  });
  document.getElementById('spec-btn').addEventListener('click',()=>{S.specOnly=!S.specOnly;refreshSpecBtn();if(S.view==='review')renderReview();});
  refreshOutcomeChips();refreshSideTabs();refreshSpecBtn();
}
function refreshOutcomeChips(){
  const wavs=getWavs(),counts={TP:0,FP:0,TN:0,FN:0};
  wavs.forEach(w=>counts[w._oc]++);
  document.querySelectorAll('#outcome-chips button').forEach(b=>{
    const code=b.dataset.oc,active=S.outcomes[code];
    b.innerHTML=`<span style="width:7px;height:7px;border-radius:2px;background:${OC[code]};display:inline-block;margin-right:2px;"></span><span style="font-size:11px;font-weight:600;">${code}</span>&nbsp;<span style="font-size:10px;color:${active?OC[code]:'#56606e'};font-weight:600;">${counts[code]}</span>`;
    b.style.cssText=`display:flex;align-items:center;gap:4px;padding:5px 10px;border-radius:7px;cursor:pointer;font-family:'IBM Plex Mono',monospace;border:1px solid ${active?'rgba(255,255,255,.14)':'rgba(255,255,255,.05)'};background:${active?'rgba(255,255,255,.04)':'transparent'};color:${active?'#cdd6e2':'#56606e'};opacity:${active?1:.55};`;
  });
}
function refreshSideTabs(){
  document.querySelectorAll('#side-tabs button').forEach(b=>{
    const v=b.dataset.side,a=v===S.side;
    b.style.background=a?(v==='mine'?'rgba(63,210,230,.16)':v==='expert'?'rgba(182,155,255,.16)':'rgba(255,255,255,.08)'):'transparent';
    b.style.color=a?(v==='mine'?'#7fe3f0':v==='expert'?'#cbb8ff':'#cdd6e2'):'#6b7484';
  });
}
function refreshSpecBtn(){
  const on=S.specOnly;
  const b=document.getElementById('spec-btn'),d=document.getElementById('spec-dot');
  b.style.border='1px solid '+(on?'rgba(63,210,230,.3)':'rgba(255,255,255,.08)');
  b.style.background=on?'rgba(63,210,230,.08)':'transparent';
  b.style.color=on?'#cdd6e2':'#7c8696';
  d.style.border='1.5px solid '+(on?'#3fd2e6':'#3a414e');
  d.style.background=on?'#3fd2e6':'transparent';
  d.style.boxShadow=on?'0 0 7px rgba(63,210,230,.5)':'none';
}

// ── screens ───────────────────────────────────────────────────────────────────
function showAll(){switchScreen();}
function switchScreen(){
  const ov=document.getElementById('overview-screen'),rv=document.getElementById('review-screen');
  if(S.view==='overview'){ov.style.display='block';rv.style.display='none';renderOverview();}
  else{ov.style.display='none';rv.style.display='flex';renderReview();}
}

// ── overview ──────────────────────────────────────────────────────────────────
function renderOverview(){
  renderKpis();
  buildModeTabs();
  switchMode(S.mode);
}

function renderKpis(){
  const wavs=getWavs(),counts={TP:0,FP:0,TN:0,FN:0};
  wavs.forEach(w=>counts[w._oc]++);
  const total=wavs.length;
  const prec=counts.TP+counts.FP?counts.TP/(counts.TP+counts.FP):0;
  const rec=counts.TP+counts.FN?counts.TP/(counts.TP+counts.FN):0;
  const f1=prec+rec?2*prec*rec/(prec+rec):0;
  const agree=total?(counts.TP+counts.TN)/total:0;
  const ks=[
    {label:'MINUTES',value:String(total),unit:'min',color:'#e8edf4',frac:1},
    {label:'PRECISION',value:(prec*100).toFixed(1),unit:'%',color:'#43e08f',frac:prec},
    {label:'RECALL',value:(rec*100).toFixed(1),unit:'%',color:'#3fd2e6',frac:rec},
    {label:'F1',value:f1.toFixed(2),unit:'',color:'#b69bff',frac:f1},
    {label:'AGREEMENT',value:(agree*100).toFixed(1),unit:'%',color:'#f2b03c',frac:agree}
  ];
  document.getElementById('kpi-strip').innerHTML=ks.map(k=>`
    <div style="background:#0e1116;border:1px solid rgba(255,255,255,.07);border-radius:13px;padding:14px 16px;">
      <div class="sec-label" style="margin-bottom:9px;">${k.label}</div>
      <div style="display:flex;align-items:baseline;gap:6px;">
        <span style="font-size:26px;font-weight:600;font-family:'IBM Plex Mono',monospace;color:${k.color};">${k.value}</span>
        <span style="font-size:11px;color:#5d6878;font-family:'IBM Plex Mono',monospace;">${k.unit}</span>
      </div>
      <div style="height:4px;border-radius:3px;background:#1a1f29;margin-top:11px;overflow:hidden;">
        <div style="height:100%;width:${Math.round(k.frac*100)}%;background:${k.color};border-radius:3px;"></div>
      </div>
    </div>`).join('');
}

function buildModeTabs(){
  const el=document.getElementById('mode-tabs');
  el.innerHTML='';
  [['density','Density heatmap'],['bands','Agreement bands'],['matrix','Confusion & metrics']].forEach(([m,l])=>{
    const b=document.createElement('button');
    b.textContent=l;b.dataset.m=m;
    b.style.cssText='padding:7px 15px;border-radius:7px;border:none;cursor:pointer;font-family:IBM Plex Sans,sans-serif;font-size:12px;';
    b.addEventListener('click',()=>switchMode(m));
    el.appendChild(b);
  });
  refreshModeTabs();
}
function refreshModeTabs(){
  const hints={density:'Spectral intensity = my model confidence per species, 5-second resolution.',bands:'Where my detections and the expert agree or conflict, minute by minute.',matrix:'Aggregate agreement at the minute level. Labels are argmax.'};
  document.querySelectorAll('#mode-tabs button').forEach(b=>{
    const a=b.dataset.m===S.mode;
    b.style.background=a?'linear-gradient(180deg,#222a37,#1a212c)':'transparent';
    b.style.color=a?'#e8edf4':'#7c8696';
    b.style.fontWeight=a?'600':'500';
    b.style.boxShadow=a?'inset 0 0 0 1px rgba(255,255,255,.08)':'none';
  });
  document.getElementById('mode-hint').textContent=hints[S.mode]||'';
}
function switchMode(m){
  S.mode=m;refreshModeTabs();
  ['density','bands','matrix'].forEach(x=>{document.getElementById(x+'-panel').style.display=x===m?'':'none';});
  if(m==='density')renderDensity();
  else if(m==='bands')renderBands();
  else renderMatrix();
}

// ── density ───────────────────────────────────────────────────────────────────
function renderDensity(){
  const panel=document.getElementById('density-panel');
  panel.innerHTML='';
  panel.style.cssText='background:#0e1116;border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:18px 20px 20px;animation:fadeUp .3s ease;';
  const wavs=getWavs(),{cols,bs}=buildCols(wavs);
  const tsAll=wavs.map(w=>w.t).filter(Boolean);
  const days=new Set(wavs.map(w=>{const d=new Date(w.t);return d.getUTCFullYear()+'-'+d.getUTCMonth()+'-'+d.getUTCDate();})).size;
  const span=tsAll.length?(days+(days===1?' day':' days')+' · '+fmtDate(Math.min(...tsAll))+' → '+fmtDate(Math.max(...tsAll))):'';
  const binNote=bs>1?' · '+bs+' min/col':'';
  const goRev=wav=>{S.view='review';S.selWav=wav;S.selSeg=0;refreshViewTabs();switchScreen();};

  addEl(panel,'div',`display:flex;align-items:center;gap:9px;margin-bottom:4px;`,
    `<span style="width:10px;height:10px;border-radius:3px;background:#3fd2e6;box-shadow:0 0 8px rgba(63,210,230,.5);"></span>
     <span style="font-size:12px;font-weight:600;letter-spacing:.04em;">MY DETECTIONS</span>
     <span style="font-size:10.5px;color:#5d6878;font-family:'IBM Plex Mono',monospace;">· per-species confidence · 5 s resolution</span>
     <span style="flex:1;"></span>
     <span style="font-size:10.5px;color:#8a94a4;font-family:'IBM Plex Mono',monospace;">${span}</span>`);

  const mineRows=addEl(panel,'div','margin:14px 0 4px;');
  const mineSp=SPORDER.filter(c=>wavs.some(w=>w.segs.some(s=>segPos(s)&&s.t.some(([cc,p])=>cc===c&&p>=0.05))));
  mineSp.forEach(code=>{
    const row=addEl(mineRows,'div','display:flex;align-items:center;gap:10px;margin-bottom:3px;');
    addEl(row,'div',`width:150px;flex:0 0 auto;font-size:11px;color:#b6c0cd;font-family:'IBM Plex Mono',monospace;text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;`,code+' · '+spName(code));
    const cells=addEl(row,'div','display:flex;flex:1;gap:1px;height:16px;');
    cols.forEach(([a,b])=>{
      let v=0;for(let i=a;i<b;i++)wavs[i].segs.forEach(s=>{if(segPos(s)){const e=s.t.find(([cc])=>cc===code);if(e&&e[1]>v)v=e[1];}});
      const on=v>=0.05,cell=addEl(cells,'div',`flex:1 1 0;min-width:2px;border-radius:2px;cursor:pointer;background:${on?cmap(v):'#11151b'};${v>=0.7?'box-shadow:0 0 6px '+cmap(v)+';':''}`);
      cell.title=colTime(wavs,a,b)+' · '+spName(code)+' · '+(v>0?(v*100).toFixed(0)+'%':'—');
      cell.addEventListener('click',()=>goRev(wavs[a].wav));
    });
  });

  addEl(panel,'div','display:flex;align-items:center;gap:9px;margin:20px 0 4px;',
    `<span style="width:10px;height:10px;border-radius:3px;background:#b69bff;box-shadow:0 0 8px rgba(182,155,255,.5);"></span>
     <span style="font-size:12px;font-weight:600;letter-spacing:.04em;">EXPERT ANNOTATIONS</span>
     <span style="font-size:10.5px;color:#5d6878;font-family:'IBM Plex Mono',monospace;">· ${S.data.datasets[S.datasetId].expertSpeciesNote||'expert'} · minute level${binNote}</span>`);

  const expRows=addEl(panel,'div','margin:14px 0 4px;');
  const expSp=Array.from(new Set(wavs.flatMap(w=>Object.keys(w.expFlags||{})))).sort((a,b)=>(SPORDER.indexOf(a)+99)-(SPORDER.indexOf(b)+99));
  (expSp.length?expSp:['—']).forEach(code=>{
    const row=addEl(expRows,'div','display:flex;align-items:center;gap:10px;margin-bottom:3px;');
    addEl(row,'div',`width:150px;flex:0 0 auto;font-size:11px;color:#c6b6ff;font-family:'IBM Plex Mono',monospace;text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;`,code+' · '+spName(code));
    const cells=addEl(row,'div','display:flex;flex:1;gap:1px;height:16px;');
    cols.forEach(([a,b])=>{
      let v=0;for(let i=a;i<b;i++){const f=wavs[i].expFlags&&wavs[i].expFlags[code];if(f!=null)v=Math.max(v,Math.min(1,f));}
      const on=v>0,cell=addEl(cells,'div',`flex:1 1 0;min-width:2px;border-radius:2px;cursor:pointer;background:${on?'rgba(182,155,255,'+(0.35+v*0.6)+')':'#11151b'};${on?'box-shadow:0 0 6px rgba(182,155,255,.45);':''}`);
      cell.title=colTime(wavs,a,b)+' · expert '+spName(code)+' · '+(on?'present':'—');
      cell.addEventListener('click',()=>goRev(wavs[a].wav));
    });
  });

  const ocOrd=['FN','FP','TP','TN'];
  const ribRow=addEl(panel,'div','display:flex;align-items:center;gap:10px;margin-top:18px;');
  addEl(ribRow,'div',`width:150px;flex:0 0 auto;font-size:11px;color:#7c8696;font-family:'IBM Plex Mono',monospace;text-align:right;`,'agreement');
  const ribCells=addEl(ribRow,'div','display:flex;flex:1;gap:1px;height:9px;');
  cols.forEach(([a,b])=>{
    let pick='TN';for(let i=a;i<b;i++){const oc=wavs[i]._oc;if(ocOrd.indexOf(oc)<ocOrd.indexOf(pick))pick=oc;}
    const cell=addEl(ribCells,'div',`flex:1 1 0;min-width:2px;border-radius:2px;cursor:pointer;background:${OC[pick]};`);
    cell.title=colTime(wavs,a,b)+' · '+OCNAME[pick];
    cell.addEventListener('click',()=>goRev(wavs[a].wav));
  });

  addTimeAxis(panel,wavs,cols,'150px');

  addEl(panel,'div','display:flex;align-items:center;gap:10px;margin-top:18px;padding-top:14px;border-top:1px solid rgba(255,255,255,.06);',
    `<span style="font-size:9.5px;color:#5d6878;font-family:'IBM Plex Mono',monospace;">low</span>
     <div style="width:180px;height:8px;border-radius:3px;background:linear-gradient(90deg,#0a0c1c,#1a2878,#226ec8,#1cb4be,#6ee078,#f2ec5a);"></div>
     <span style="font-size:9.5px;color:#5d6878;font-family:'IBM Plex Mono',monospace;">high&nbsp;confidence</span>
     <span style="flex:1;"></span>
     <span style="font-size:10.5px;color:#5d6878;">Click any cell to inspect that minute in Review</span>`);
}

// ── bands ─────────────────────────────────────────────────────────────────────
function renderBands(){
  const panel=document.getElementById('bands-panel');
  panel.innerHTML='';
  panel.style.cssText='background:#0e1116;border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:20px;animation:fadeUp .3s ease;';
  const wavs=getWavs(),{cols}=buildCols(wavs);
  const ocOrd=['FN','FP','TP','TN'];
  const goRev=wav=>{S.view='review';S.selWav=wav;S.selSeg=0;refreshViewTabs();switchScreen();};

  const lanes=[
    {label:'MINE',color:'#3fd2e6',h:'20px',fn:([a,b])=>{let m=0;for(let i=a;i<b;i++)wavs[i].segs.forEach(s=>{if(segPos(s)&&s.mp>m)m=s.mp;});const on=m>0;return{wav:wavs[a].wav,bg:on?'rgba(63,210,230,'+(0.3+m*0.65)+')':'#141821',title:colTime(wavs,a,b)+' · mine '+(on?(m*100).toFixed(0)+'%':'none')};}},
    {label:'EXPERT',color:'#b69bff',h:'20px',fn:([a,b])=>{let on=false,sp='';for(let i=a;i<b;i++)if(wavs[i].expDet){on=true;sp=wavs[i].expSp||'detected';}return{wav:wavs[a].wav,bg:on?'rgba(182,155,255,.85)':'#141821',title:colTime(wavs,a,b)+' · expert '+(on?sp:'none')};}},
    {label:'OUTCOME',color:'#8b95a4',h:'26px',fn:([a,b])=>{let pick='TN';for(let i=a;i<b;i++){const oc=wavs[i]._oc;if(ocOrd.indexOf(oc)<ocOrd.indexOf(pick))pick=oc;}return{wav:wavs[a].wav,bg:OC[pick],title:colTime(wavs,a,b)+' · '+OCNAME[pick]};}}
  ];

  lanes.forEach(lane=>{
    const row=addEl(panel,'div','display:flex;align-items:center;gap:12px;margin-bottom:9px;');
    addEl(row,'div',`width:120px;flex:0 0 auto;display:flex;align-items:center;gap:7px;justify-content:flex-end;`,
      `<span style="font-size:11px;font-weight:600;color:${lane.color};letter-spacing:.05em;">${lane.label}</span>`);
    const cellsEl=addEl(row,'div',`display:flex;flex:1;gap:2px;height:${lane.h};`);
    cols.forEach(col=>{
      const{wav,bg,title}=lane.fn(col);
      const cell=addEl(cellsEl,'div',`flex:1 1 0;min-width:3px;border-radius:3px;cursor:pointer;background:${bg};`);
      cell.title=title;
      cell.addEventListener('click',()=>goRev(wav));
      cell.addEventListener('mouseenter',()=>{cell.style.boxShadow='0 0 0 1px '+lane.color;});
      cell.addEventListener('mouseleave',()=>{cell.style.boxShadow='none';});
    });
  });

  addTimeAxis(panel,wavs,cols,'120px');

  const leg=addEl(panel,'div','display:flex;align-items:center;gap:20px;margin-top:18px;padding-top:14px;border-top:1px solid rgba(255,255,255,.06);');
  ['TP','FP','FN','TN'].forEach(c=>{addEl(leg,'span','display:flex;align-items:center;gap:6px;font-size:11px;color:#9aa6b6;',`<span style="width:11px;height:11px;border-radius:3px;background:${OC[c]};"></span>${c} — ${OCNAME[c]}`);});
  addEl(leg,'span','flex:1;');
  addEl(leg,'span','font-size:10.5px;color:#5d6878;','Each column = one minute. Click to open in Review.');
}

// ── matrix ────────────────────────────────────────────────────────────────────
function renderMatrix(){
  const panel=document.getElementById('matrix-panel');
  const wavs=getWavs(),counts={TP:0,FP:0,TN:0,FN:0};
  wavs.forEach(w=>counts[w._oc]++);
  const prec=counts.TP+counts.FP?counts.TP/(counts.TP+counts.FP):0;
  const rec=counts.TP+counts.FN?counts.TP/(counts.TP+counts.FN):0;
  const f1=prec+rec?2*prec*rec/(prec+rec):0;
  const segCounts={};SPORDER.forEach(c=>segCounts[c]=0);
  wavs.forEach(w=>w.segs.forEach(s=>{if(segPos(s)&&segCounts[s.p]!=null)segCounts[s.p]++;}));
  const maxc=Math.max(1,...Object.values(segCounts));
  const spBars=SPORDER.filter(c=>segCounts[c]>0).sort((a,b)=>segCounts[b]-segCounts[a]).map(c=>`
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:11px;">
      <div style="width:150px;flex:0 0 auto;font-size:11px;color:#b6c0cd;font-family:'IBM Plex Mono',monospace;text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${c} · ${spName(c)}</div>
      <div style="flex:1;height:13px;border-radius:4px;background:#15191f;overflow:hidden;"><div style="height:100%;width:${Math.round(segCounts[c]/maxc*100)}%;background:linear-gradient(90deg,#1f6fa8,#3fd2e6);border-radius:4px;"></div></div>
      <div style="width:54px;flex:0 0 auto;font-size:11px;color:#9aa6b6;font-family:'IBM Plex Mono',monospace;text-align:right;">${segCounts[c]}</div>
    </div>`).join('');
  panel.innerHTML=`<div style="display:grid;grid-template-columns:minmax(380px,1.1fr) 1.4fr;gap:18px;animation:fadeUp .3s ease;">
    <div class="card" style="padding:22px;">
      <div style="font-size:12px;font-weight:600;letter-spacing:.04em;margin-bottom:4px;">CONFUSION MATRIX</div>
      <div style="font-size:10.5px;color:#5d6878;margin-bottom:18px;">Argmax · a minute is "mine +" if any 5 s segment predicts a non-background class.</div>
      <div style="display:flex;gap:10px;">
        <div style="font-size:9px;color:#7c8696;font-family:'IBM Plex Mono',monospace;letter-spacing:.1em;writing-mode:vertical-rl;transform:rotate(180deg);text-align:center;">MY MODEL</div>
        <div style="flex:1;">
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;">
            <div style="text-align:center;font-size:9.5px;color:#7c8696;font-family:'IBM Plex Mono',monospace;">EXPERT +</div>
            <div style="text-align:center;font-size:9.5px;color:#7c8696;font-family:'IBM Plex Mono',monospace;">EXPERT −</div>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
            ${['TP','FP','FN','TN'].map(c=>`<div style="background:#11151c;border:1px solid rgba(255,255,255,.08);border-radius:11px;padding:16px;">
              <div style="font-size:9px;color:#7c8696;letter-spacing:.12em;font-family:'IBM Plex Mono',monospace;">${c}</div>
              <div style="font-size:30px;font-weight:600;font-family:'IBM Plex Mono',monospace;color:${OC[c]};line-height:1.1;margin-top:6px;">${counts[c]}</div>
              <div style="font-size:10px;color:#7c8696;margin-top:3px;">${OCNAME[c]}</div>
            </div>`).join('')}
          </div>
        </div>
      </div>
    </div>
    <div style="display:flex;flex-direction:column;gap:18px;">
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:14px;">
        ${[{label:'PRECISION',value:(prec*100).toFixed(1)+'%',color:'#43e08f',pct:Math.round(prec*100)+'%',sub:'TP / (TP+FP)'},{label:'RECALL',value:(rec*100).toFixed(1)+'%',color:'#3fd2e6',pct:Math.round(rec*100)+'%',sub:'TP / (TP+FN)'},{label:'F1 SCORE',value:f1.toFixed(2),color:'#b69bff',pct:Math.round(f1*100)+'%',sub:'harmonic mean'}].map(m=>`
          <div class="card" style="padding:18px;">
            <div class="sec-label">${m.label}</div>
            <div style="font-size:30px;font-weight:600;font-family:'IBM Plex Mono',monospace;color:${m.color};margin-top:8px;">${m.value}</div>
            <div style="height:5px;border-radius:3px;background:#1a1f29;margin-top:12px;overflow:hidden;"><div style="height:100%;width:${m.pct};background:${m.color};border-radius:3px;"></div></div>
            <div style="font-size:10px;color:#5d6878;margin-top:8px;">${m.sub}</div>
          </div>`).join('')}

      <div class="card" style="padding:20px;flex:1;">

}

// ── review ────────────────────────────────────────────────────────────────────
function renderReview(){
  const wavs=getWavs(),filtered=wavs.filter(passFilters);
  let sel=S.selWav;
  if(!sel||!filtered.some(w=>w.wav===sel))sel=filtered.length?filtered[0].wav:null;
  S.selWav=sel;
  let rail=filtered.slice(0,RAIL_CAP);
  if(sel&&!rail.some(w=>w.wav===sel)){const sw=filtered.find(w=>w.wav===sel);if(sw)rail=[sw].concat(rail.slice(0,RAIL_CAP-1));}
  const note=filtered.length>RAIL_CAP?' · showing '+rail.length:'';
  document.getElementById('rail-count').textContent=filtered.length+' / '+wavs.length+note;
  const listEl=document.getElementById('rail-list');
  listEl.innerHTML='';
  rail.forEach(w=>{
    const active=w.wav===sel,oc=w._oc,mp=w.segs.filter(segPos).length;
    const item=document.createElement('div');
    item.style.cssText=`padding:10px 11px;border-radius:10px;cursor:pointer;margin-bottom:5px;border:1px solid ${active?'rgba(63,210,230,.4)':'rgba(255,255,255,.05)'};background:${active?'rgba(63,210,230,.07)':'rgba(255,255,255,.015)'};`;
    item.innerHTML=`<div style="display:flex;align-items:center;gap:8px;">
      <span style="font-family:'IBM Plex Mono',monospace;font-size:9.5px;font-weight:700;padding:2px 6px;border-radius:5px;color:#0a0c10;background:${OC[oc]};">${oc}</span>
      <span style="font-size:11.5px;color:#c6cfdb;font-family:'IBM Plex Mono',monospace;">${fmtTime(w.t)}</span>
      <span style="flex:1;"></span>
      <span style="font-size:9px;font-family:'IBM Plex Mono',monospace;color:${w.spec?'#3fd2e6':'#3a414e'};letter-spacing:.05em;">${w.spec?'◼ SPEC':'· · ·'}</span>
    </div>
    <div style="display:flex;gap:1px;height:7px;margin-top:8px;border-radius:2px;overflow:hidden;">
      ${w.segs.map(s=>`<div style="flex:1 1 0;background:${segPos(s)?cmap(s.mp):'#1a1f29'};"></div>`).join('')}
    </div>
    <div style="display:flex;align-items:center;gap:8px;margin-top:7px;">
      <span style="font-size:10px;color:#6b7484;">mine: <span style="color:#3fd2e6;font-family:'IBM Plex Mono',monospace;">${mp}</span></span>
      <span style="font-size:10px;color:#6b7484;">expert: <span style="${w.expDet?'color:#c6b6ff':'color:#56606e'};font-family:'IBM Plex Mono',monospace;">${w.expDet?(w.expSp||'detected'):'—'}</span></span>
    </div>`;
    item.addEventListener('click',()=>{S.selWav=w.wav;S.selSeg=0;renderReview();});
    listEl.appendChild(item);
  });
  if(sel){renderDetail(wavs.find(w=>w.wav===sel));}
  else{document.getElementById('review-detail').innerHTML=`<div style="display:flex;align-items:center;justify-content:center;height:80%;flex-direction:column;gap:10px;"><div style="font-family:'IBM Plex Mono',monospace;font-size:12px;color:#5d6878;letter-spacing:.12em;">NO MINUTES MATCH FILTERS</div><div style="font-size:11px;color:#454e5c;">Relax the outcome / species / spectrogram filters above</div></div>`;}
}

function renderDetail(w){
  const det=document.getElementById('review-detail');
  det.innerHTML='';
  if(!w)return;
  const oc=w._oc,nseg=w.segs.length;
  let si=Math.max(0,Math.min(S.selSeg,nseg-1));
  const seg=w.segs[si];
  const posCount=w.segs.filter(segPos).length,imgCount=w.segs.filter(s=>s.specPath).length;
  const trainH=128,tileW=Math.round(trainH*SPEC.w/SPEC.h);

  const hdr=addEl(det,'div','display:flex;align-items:center;gap:14px;margin-bottom:16px;',
    `<div><div style="font-size:16px;font-weight:600;font-family:'IBM Plex Mono',monospace;letter-spacing:.02em;">${w.wav}</div>
     <div style="font-size:11px;color:#5d6878;margin-top:4px;">${fmtTime(w.t)} · ${w.dur||60} s · ${nseg} segments · ${posCount} positive</div></div>
     <span style="flex:1;"></span>
     <span style="font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:700;padding:6px 12px;border-radius:8px;color:#0a0c10;background:${OC[oc]};">${OCNAME[oc]}</span>`);

  const trainCard=addEl(det,'div','background:#0e1116;border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:16px 0 14px;margin-bottom:16px;overflow:hidden;');
  addEl(trainCard,'div','display:flex;align-items:center;gap:9px;margin:0 18px 12px;',
    `<span style="font-size:11px;font-weight:600;letter-spacing:.04em;color:#b6c0cd;">SPECTROGRAM TRAIN</span>
     <span style="font-size:10px;color:#5d6878;font-family:'IBM Plex Mono',monospace;">· ${posCount} positive / ${nseg} segments · ${imgCount} with image</span>
     <span style="flex:1;"></span>
     <span style="font-size:10px;color:#7c8696;font-family:'IBM Plex Mono',monospace;">log-mel · 0–${SPEC.fmax/1000} kHz</span>`);

  const scroll=addEl(trainCard,'div','overflow-x:auto;padding:0 18px 4px;');
  const inner=addEl(scroll,'div','display:flex;align-items:flex-start;width:max-content;');

  const fax=addEl(inner,'div',`position:sticky;left:0;z-index:3;flex:0 0 auto;width:50px;background:#0e1116;padding-right:7px;`);
  const finner=addEl(fax,'div',`position:relative;height:${trainH}px;border-right:1px solid rgba(255,255,255,.16);`);
  freqTicks().forEach(t=>{
    addEl(finner,'div',`position:absolute;right:0;width:6px;height:1px;background:rgba(255,255,255,.35);top:${((1-t.pos)*100).toFixed(1)}%;`);
    addEl(finner,'div',`position:absolute;right:9px;top:${((1-t.pos)*100).toFixed(1)}%;transform:translateY(-50%);font-size:9px;color:#8a94a4;font-family:'IBM Plex Mono',monospace;white-space:nowrap;`,String(t.label));
  });
  addEl(fax,'div','text-align:right;padding-right:2px;margin-top:5px;font-size:8px;color:#5d6878;font-family:IBM Plex Mono,monospace;letter-spacing:.08em;','kHz');

  w.segs.forEach((s,i)=>{
    const isPos=segPos(s),isSel=i===si;
    const topConf=s.t[0]?s.t[0][1]:0;
    const accent=isPos?cmap(Math.max(topConf,s.mp)):'#39414e';
    const tile=addEl(inner,'div',`flex:0 0 auto;width:${tileW}px;margin-right:2px;cursor:pointer;border-radius:7px;overflow:hidden;border:2px solid ${isSel?'#e8edf4':'transparent'};box-shadow:${isSel?'0 0 0 3px rgba(232,237,244,.12)':'none'};opacity:${isPos?1:0.62};`);
    const imgWrap=addEl(tile,'div',`position:relative;width:100%;height:${trainH}px;background:#05060a;border-bottom:2px solid ${accent};`);
    if(s.specPath){
      const img=document.createElement('img');
      img.src=s.specPath;img.style.cssText='display:block;width:100%;height:100%;object-fit:cover;';
      img.onerror=function(){if(!this.dataset.fb){this.dataset.fb='1';this.style.display='none';addEl(imgWrap,'div','width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:9.5px;color:#454e5c;font-family:IBM Plex Mono,monospace;letter-spacing:.1em;','NO SPEC');}};
      imgWrap.appendChild(img);
    } else {
      addEl(imgWrap,'div','width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:repeating-linear-gradient(45deg,#0d1116,#0d1116 8px,#0f141b 8px,#0f141b 16px);',
        '<span style="font-size:9.5px;color:#454e5c;font-family:IBM Plex Mono,monospace;letter-spacing:.1em;">NO SPEC</span>');
    }
    addEl(tile,'div',`display:flex;align-items:center;gap:6px;padding:6px 8px;background:${isSel?'rgba(232,237,244,.07)':'rgba(255,255,255,.02)'};`,
      `<span style="font-size:9.5px;color:#7c8696;font-family:'IBM Plex Mono',monospace;">${s.o}–${s.o+5}s</span>
       <span style="flex:1;"></span>
       <span style="font-family:'IBM Plex Mono',monospace;font-size:9.5px;font-weight:600;padding:2px 6px;border-radius:4px;color:${isPos?'#050709':'#5d6878'};background:${isPos?accent:'#1c2029'};">${isPos?s.p:'bg'}</span>
       <span style="font-size:9.5px;font-weight:600;font-family:'IBM Plex Mono',monospace;color:#9aa6b6;">${isPos?(topConf*100).toFixed(0)+'%':((1-s.mp)*100).toFixed(0)+'%'}</span>`);
    tile.addEventListener('click',()=>{S.selSeg=i;renderDetail(w);});
  });

  addEl(trainCard,'div','margin:9px 18px 0;font-size:10px;color:#5d6878;','Each tile = one 5 s segment. Click a tile to inspect its probabilities. Scroll → for the full recording.');

  const bot=addEl(det,'div','display:grid;grid-template-columns:1.4fr 1fr;gap:16px;');

  const predLabel=seg.p;
  const rows=(seg.t||[]).map(([c,p])=>({code:c,prob:p,isBg:false}));
  rows.push({code:'bg',prob:Math.max(0,1-seg.mp),isBg:true});
  rows.sort((a,b)=>b.prob-a.prob);
  const predCard=addEl(bot,'div','background:#0e1116;border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:18px 20px;');
  addEl(predCard,'div','display:flex;align-items:center;gap:10px;margin-bottom:5px;',
    `<span style="width:9px;height:9px;border-radius:2px;background:#3fd2e6;box-shadow:0 0 7px rgba(63,210,230,.5);"></span>
     <span style="font-size:12px;font-weight:600;">MY PREDICTION</span>
     <span style="flex:1;"></span>
     <span style="font-size:10.5px;color:#5d6878;font-family:'IBM Plex Mono',monospace;">${seg.o}s – ${seg.o+5}s</span>`);
  addEl(predCard,'div','font-size:10.5px;color:#5d6878;margin-bottom:16px;',
    `Class probabilities · 5-second segment · argmax → <span style="color:#9aa6b6;font-family:'IBM Plex Mono',monospace;">${predLabel}</span>`);
  rows.forEach(r=>{
    const win=r.code===predLabel,bc=r.isBg?'#6b7484':cmap(r.prob);
    const row=addEl(predCard,'div','margin-bottom:13px;');
    addEl(row,'div','display:flex;align-items:center;gap:8px;margin-bottom:5px;',
      `<span style="font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:700;padding:2px 7px;border-radius:5px;color:${r.isBg?'#c6cfdb':'#050709'};background:${r.isBg?'#262d3a':cmap(Math.max(r.prob,0.25))};">${r.code}</span>
       <span style="font-size:12px;color:${r.isBg?'#8a94a4':'#c6cfdb'};">${r.isBg?'Background (implied)':spName(r.code)}</span>
       ${win?`<span style="font-family:'IBM Plex Mono',monospace;font-size:8.5px;font-weight:700;letter-spacing:.1em;padding:2px 6px;border-radius:4px;color:#0a0c10;background:#3fd2e6;">argmax</span>`:''}
       <span style="flex:1;"></span>
       <span style="font-size:12px;font-weight:600;font-family:'IBM Plex Mono',monospace;color:${win?'#e8edf4':'#9aa6b6'};">${(r.prob*100).toFixed(1)}%</span>`);
    addEl(row,'div','height:9px;border-radius:5px;background:#15191f;overflow:hidden;',
      `<div style="height:100%;width:${Math.max(2,r.prob*100)}%;background:${bc};border-radius:5px;"></div>`);
  });

  const autoOc=segPos(seg)?(w.expDet?'TP':'FP'):(w.expDet?'FN':'TN');
  const expChips=w.expFlags?Object.entries(w.expFlags).sort((a,b)=>b[1]-a[1]).map(([c,v])=>`<span style="display:inline-flex;align-items:center;gap:5px;padding:4px 9px;border-radius:6px;background:rgba(182,155,255,.1);border:1px solid rgba(182,155,255,.22);font-size:10.5px;font-family:'IBM Plex Mono',monospace;color:#c6b6ff;">${c} ${typeof v==='number'?v.toFixed(2):v}</span>`).join(''):'';
  const expCard=addEl(bot,'div','background:#0e1116;border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:18px 20px;');
  addEl(expCard,'div','display:flex;align-items:center;gap:10px;margin-bottom:14px;',
    `<span style="width:9px;height:9px;border-radius:2px;background:#b69bff;box-shadow:0 0 7px rgba(182,155,255,.5);"></span>
     <span style="font-size:12px;font-weight:600;">EXPERT</span>
     <span style="flex:1;"></span>
     <span style="font-size:10px;color:#5d6878;font-family:'IBM Plex Mono',monospace;">minute level</span>`);
  addEl(expCard,'div','',
    `<div style="font-size:20px;font-weight:600;color:${w.expDet?'#c6b6ff':'#6b7484'};">${w.expDet?(w.expSp&&w.expSp!=='background'?spName(w.expSp):'Detected'):'No detection'}</div>
     <div style="font-size:11px;color:#7c8696;margin-top:6px;">${w.expDet?'Expert annotated this minute as a positive detection.':'Expert marked this minute as background / no call.'}</div>
     ${expChips?`<div style="margin-top:14px;display:flex;flex-wrap:wrap;gap:6px;">${expChips}</div>`:''}
     <div style="margin-top:16px;padding-top:13px;border-top:1px solid rgba(255,255,255,.06);display:flex;align-items:center;gap:8px;">
       <span style="font-size:10.5px;color:#5d6878;">Segment outcome (argmax):</span>
       <span style="font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:600;padding:2px 8px;border-radius:5px;color:#0a0c10;background:${OC[autoOc]};">${autoOc}</span>
     </div>`);
}

// ── helpers ───────────────────────────────────────────────────────────────────
function addEl(parent,tag,css,html){
  const e=document.createElement(tag);
  if(css)e.style.cssText=css;
  if(html!=null)e.innerHTML=html;
  parent.appendChild(e);
  return e;
}
function addTimeAxis(parent,wavs,cols,labelW){
  const wrap=addEl(parent,'div',`display:flex;gap:10px;margin-top:7px;`);
  addEl(wrap,'div',`width:${labelW};flex:0 0 auto;`);
  const ticks=addEl(wrap,'div','flex:1;display:flex;justify-content:space-between;font-size:9.5px;color:#5d6878;font-family:IBM Plex Mono,monospace;');
  const idxs=[0,Math.floor(cols.length*0.2),Math.floor(cols.length*0.4),Math.floor(cols.length*0.6),Math.floor(cols.length*0.8),cols.length-1];
  idxs.forEach(i=>{if(i>=cols.length)return;const[a]=cols[i];addEl(ticks,'span','display:flex;flex-direction:column;align-items:center;line-height:1.35;',`<span style="color:#9aa6b6;">${fmtHour(wavs[a].t)}</span><span style="color:#56606e;">${fmtDate(wavs[a].t)}</span>`);});
}
</script>
